name: Build Mesh Audio Network ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up disk space
        run: |
          df -h
          if [ $(free -m | awk '/Mem:/ {print $2}') -lt 4096 ]; then
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
          fi
      
      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          echo 'export PATH=/nix/var/nix/profiles/default/bin:$PATH' >> $GITHUB_ENV
      
      - name: Create flake.nix
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          # Create flake.nix for ISO build
          cat > flake.nix << 'FLAKEEOF'
          {
            description = "Mesh Audio Network ISO";
            
            inputs.nixpkgs.url = "github:NixOS/nixpkgs/nixos-24.05";
            
            outputs = { self, nixpkgs }:
            let
              configuration = { config, pkgs, ... }: {
                imports = [
                  nixpkgs + "/nixos/modules/installer/scan/not-detected.nix"
                ];
                
                # Boot
                boot.loader.grub.enable = true;
                boot.loader.grub.device = "/dev/sda";
                boot.supportedFilesystems = [ "ext4" "vfat" ];
                
                # Enable flakes
                nix.settings.experimental-features = [ "nix-command" "flakes" ];
                
                # Locale
                i18n.defaultLocale = "en_US.UTF-8";
                time.timeZone = "UTC";
                
                # Mesh networking
                boot.kernelModules = [ "batman-adv" "mac80211" "cfg80211" ];
                
                # Network
                networking.firewall.enable = false;
                
                # Packages
                environment.systemPackages = with pkgs; [
                  batctl iw iproute2 ffmpeg mplayer mpg123
                  python3 curl wget git vim htop
                ];
                
                # Services
                services.openssh.enable = true;
                
                # Users
                users.users.mesh = {
                  isNormalUser = true;
                  extraGroups = [ "wheel" ];
                  initialPassword = "mesh123";
                };
                users.users.root.initialPassword = "root123";
                
                # Sound
                sound.enable = true;
              };
            in {
              nixosConfigurations.iso = nixpkgs.lib.nixosSystem {
                system = "x86_64-linux";
                modules = [ configuration ];
              };
            };
          }
          FLAKEEOF
          
          echo "=== Created flake.nix ==="
          cat flake.nix
      
      - name: Build ISO with flake
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          mkdir -p ~/.config/nix
          echo 'experimental-features = nix-command flakes' > ~/.config/nix/nix.conf
          
          echo "=== Building ISO with flakes ==="
          nix build .#nixosConfigurations.iso.config.system.build.isoImage --print-outputs -o result 2>&1 | tail -30
          
          echo "=== Checking result ==="
          ls -la result/ 2>/dev/null || echo "No result"
      
      - name: Copy ISO
        run: |
          mkdir -p output
          
          if [ -f result/iso/iso.xz ]; then
            cp result/iso/iso.xz output/mesh-audio-network.iso.xz
            echo "Found ISO at result/iso/iso.xz"
          fi
          
          if [ -f result/isoImage ]; then
            cp result/isoImage output/mesh-audio-network.iso
            echo "Found ISO at result/isoImage"
          fi
          
          find result -name "*.iso" -exec cp {} output/ \; 2>/dev/null || true
          find result -name "*.iso.xz" -exec cp {} output/ \; 2>/dev/null || true
          
          echo "=== Files in output/ ==="
          ls -lh output/
      
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mesh-audio-network-iso
          path: output/*
          retention-days: 7
      
      - name: Summary
        run: |
          echo "## Build Summary"
          echo "Files in output/:"
          ls -lh output/ 2>/dev/null || echo "Empty"