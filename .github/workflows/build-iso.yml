name: Build Mesh Audio Network ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up disk space
        run: |
          df -h
          # Create swap if needed
          if [ $(free -m | awk '/Mem:/ {print $2}') -lt 4096 ]; then
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
          fi
          df -h
      
      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          echo 'export PATH=/nix/var/nix/profiles/default/bin:$PATH' >> $GITHUB_ENV
      
      - name: Configure Nix trusted users
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          mkdir -p ~/.config/nix
          cat > ~/.config/nix/nix.conf << 'EOF'
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org https://nix-community.cachix.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFG5cSKWhX0= nix-community.cachix.org-1:mB9FSh9ef2aH0SaQ+7q3WMAUiQ3pvsGdeZ3gBiXe0yk=
          trusted-users = root ubuntu
          builders = @/etc/nix/machines
          EOF
      
      - name: Create configuration.nix
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          # Create nixos configuration for ISO
          cat > configuration.nix << 'NIXEOF'
          { config, pkgs, ... }:
          
          {
            imports = [
              # Use installation device profile for ISO
              <nixpkgs/nixos/modules/installer/scan/not-detected.nix>
            ];
          
            # Boot configuration
            boot.loader.grub.enable = true;
            boot.loader.grub.device = if pkgs.stdenv.isAarch64 then null else (if pkgs.stdenv.hasZfs then null else null);
            boot.supportedFilesystems = [ ext4 vfat ];
            
            # Enable flakes
            nix.settings.experimental-features = [ nix-command flakes ];
            nix.channel.enable = true;
            
            # Locale and timezone
            i18n.defaultLocale = lib.mkForce \"en_US.UTF-8\";
            time.timeZone = lib.mkForce \"UTC\";
            
            # Mesh networking kernel modules
            boot.kernelModules = [ \"batman-adv\" \"mac80211\" \"cfg80211\" ];
            
            # Network
            networking.firewall.enable = false;
            
            # Packages for mesh audio network
            environment.systemPackages = with pkgs; [
              batctl iw wireless-tools iproute2
              ffmpeg mplayer mpg123 opus-tools sox
              python3 curl wget git vim htop
              go gcc
            ];
            
            # Services
            services.openssh.enable = true;
            
            # Users
            users.users.mesh = {
              isNormalUser = true;
              extraGroups = [ \"wheel\" ];
              initialPassword = \"mesh123\";
            };
            users.users.root.initialPassword = \"root123\";
            
            # Sound
            sound.enable = true;
            
            # Auto-login (optional - can be disabled for security)
            # services.getty.autologinUser = \"mesh\";
          }
          NIXEOF
          
          echo created configuration.nix
          head -50 configuration.nix
      
      - name: Build ISO with nix-build
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          echo \"=== Building NixOS ISO ===\"
          echo \"Nix version: $(nix --version)\"
          
          # Build using nixos-rebuild or nix-build
          nix-build '<nixpkgs/nixos>' -A config.system.build.isoImage -I nixos-config=./configuration.nix --show-trace -o result 2>&1 | tail -100
          
          echo \"=== Build finished ===\"
          ls -la result/ 2>/dev/null || echo \"No result directory\"
      
      - name: Copy ISO to output
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          mkdir -p output
          
          # Find the ISO file
          if [ -d result/iso ]; then
            echo \"Found ISO in result/iso/\"
            cp result/iso/*.iso output/ 2>/dev/null || true
          fi
          
          if [ -d result ]; then
            find result -name \"*.iso\" -exec cp {} output/ \";\" 2>/dev/null || true
          fi
          
          echo \"=== ISO files in output/ ===\"
          ls -lh output/
          
          if [ -f output/*.iso ]; then
            echo \"SUCCESS: ISO created at $(ls output/*.iso)\"
          else
            echo \"WARNING: No ISO found in output/\"
          fi
      
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mesh-audio-network-iso
          path: |
            output/*.iso
            songs/
          retention-days: 7
      
      - name: Summary
        run: |
          echo \"## Build Summary\"
          echo \"ISO files: $(ls output/*.iso 2>/dev/null || echo 'None')\"
          echo \"Songs created: $(ls songs/all_songs/*.json 2>/dev/null | wc -l)\"
          if [ -f output/*.iso ]; then
            ISO_SIZE=$(du -h output/*.iso | cut -f1)
            echo \"ISO size: $ISO_SIZE\"
          fi