name: Build Mesh Audio Network ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up disk space
        run: |
          df -h
          if [ $(free -m | awk '/Mem:/ {print $2}') -lt 4096 ]; then
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
          fi
          df -h
      
      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          echo 'export PATH=/nix/var/nix/profiles/default/bin:$PATH' >> $GITHUB_ENV
      
      - name: Configure Nix
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          mkdir -p ~/.config/nix
          cat > ~/.config/nix/nix.conf << 'EOF'
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFG5cSKWhX0=
          trusted-users = root ubuntu
          EOF
      
      - name: Create configuration.nix
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          cat > configuration.nix << 'NIXEOF'
          { config, pkgs, ... }:
          
          {
            imports = [
              <nixpkgs/nixos/modules/installer/scan/not-detected.nix>
            ];
          
            # Boot configuration  
            boot.loader.grub.enable = true;
            boot.loader.grub.device = "/dev/sda";
            boot.supportedFilesystems = [ "ext4" "vfat" ];
            
            # Enable flakes
            nix.settings.experimental-features = [ "nix-command" "flakes" ];
            nix.channel.enable = true;
            
            # Locale
            i18n.defaultLocale = "en_US.UTF-8";
            time.timeZone = "UTC";
            
            # Mesh networking kernel modules
            boot.kernelModules = [ "batman-adv" "mac80211" "cfg80211" ];
            
            # Network
            networking.firewall.enable = false;
            
            # Packages
            environment.systemPackages = with pkgs; [
              batctl iw iproute2
              ffmpeg mplayer mpg123
              python3 curl wget git vim htop
            ];
            
            # Services
            services.openssh.enable = true;
            
            # Users
            users.users.mesh = {
              isNormalUser = true;
              extraGroups = [ "wheel" ];
              initialPassword = "mesh123";
            };
            users.users.root.initialPassword = "root123";
            
            # Sound
            sound.enable = true;
          }
          NIXEOF
          
          echo "=== Created configuration.nix ==="
          head -30 configuration.nix
      
      - name: Build ISO
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          echo "=== Building NixOS ISO ==="
          nix-build '<nixpkgs/nixos>' -A config.system.build.isoImage -I nixos-config=./configuration.nix -o result 2>&1 | tail -50
          
          echo "=== Checking result ==="
          ls -la result/ 2>/dev/null || echo "No result directory"
      
      - name: Copy ISO to output
        run: |
          mkdir -p output
          
          if [ -d result/iso ]; then
            echo "Found ISO in result/iso/"
            cp result/iso/*.iso output/ 2>/dev/null || true
          fi
          
          find result -name "*.iso" -exec cp {} output/ \; 2>/dev/null || true
          
          echo "=== ISO files ==="
          ls -lh output/
          
          if [ -f output/*.iso ]; then
            echo "SUCCESS: ISO created at $(ls output/*.iso)"
            echo "SIZE: $(du -h output/*.iso | cut -f1)"
          else
            echo "WARNING: No ISO found"
          fi
      
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mesh-audio-network-iso
          path: |
            output/*.iso
          retention-days: 7
      
      - name: Summary
        run: |
          echo "## Build Summary"
          echo "ISO: $(ls output/*.iso 2>/dev/null | head -1 || echo 'None')"
          if [ -f output/*.iso ]; then
            du -h output/*.iso
          fi