name: Build Mesh Audio Network ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full clone for flakes
      
      - name: Set up disk space
        run: |
          df -h
          if [ $(free -m | awk '/Mem:/ {print $2}') -lt 4096 ]; then
            sudo fallocate -l 4G /swapfile || true
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
          fi
      
      - name: Install Nix
        run: |
          sh <(curl -L https://nixos.org/nix/install) --daemon --yes
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          echo 'export PATH=/nix/var/nix/profiles/default/bin:$PATH' >> $GITHUB_ENV
      
      - name: Configure Nix
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          mkdir -p ~/.config/nix
          cat > ~/.config/nix/nix.conf << 'EOF'
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFG5cSKWhX0=
          trusted-users = root ubuntu
          EOF
      
      - name: Build ISO
        run: |
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          
          echo "=== Building ISO ==="
          nix build .#default --out-link result -v 2>&1 | tail -80
          
          echo "=== Checking result ==="
          ls -la result/ 2>/dev/null || echo "No result"
      
      - name: Copy ISO
        run: |
          mkdir -p output
          
          # Find ISO
          if [ -f result/iso/iso.xz ]; then
            cp result/iso/iso.xz output/mesh-audio-network.iso.xz
            xz -d output/mesh-audio-network.iso.xz
            echo "Found and decompressed ISO"
          fi
          
          find result -name "*.iso" -exec cp {} output/ \; 2>/dev/null || true
          
          echo "=== Files in output/ ==="
          ls -lh output/
      
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mesh-audio-network-iso
          path: output/*
          retention-days: 7
      
      - name: Summary
        run: |
          echo "## Build Summary"
          ls -lh output/ 2>/dev/null || echo "Empty"